<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<style>
  body {
    background-color: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* Загальний контейнер інструменту */
  .ukulele-layer-1 {
    display: flex;
    align-items: center;
    position: relative;
    /* Зменшений загальний розмір */
    width: 750px; 
  }

  /* 1. ГОЛОВА УКУЛЕЛЕ */
  .uke-head {
    width: 90px;
    height: 60px;
    background: linear-gradient(135deg, #1a2c47, #0d1522); /* Синя Enya */
    border-radius: 12px 0 0 12px;
    border-right: 8px solid #f0f0f5; /* Біла кісточка (Nut) */
    box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
    z-index: 1;
  }

  /* 2. ГРИФ (ТРАПЕЦІЯ) */
  .uke-neck {
    width: 400px;
    height: 90px; /* Максимальна висота біля деки */
    background: linear-gradient(180deg, #3a2210 0%, #1e1108 100%); /* Темне палісандрове дерево */
    display: flex;
    z-index: 2;
    margin-right: -30px; /* Гриф трохи заходить на деку, як в реальності */
    
    /* МАГІЯ ЗВУЖЕННЯ: Зрізаємо верхній та нижній ліві кути */
    /* Біля голови висота буде меншою, а біля деки - повною */
    clip-path: polygon(0 15px, 100% 0, 100% 90px, 0 75px);
  }

  /* 3. ЛАДИ (Зменшуються шириною від 1 до 12) */
  .uke-fret {
    border-right: 3px solid #b8b8b8; /* Металевий поріжок */
    box-shadow: inset -1px 0 2px rgba(0,0,0,0.4);
    position: relative;
  }
  
  /* Реалістичні пропорції ладів (від найширшого до найвужчого) */
  .uke-fret:nth-child(1) { width: 13%; }
  .uke-fret:nth-child(2) { width: 12%; }
  .uke-fret:nth-child(3) { width: 11%; }
  .uke-fret:nth-child(4) { width: 10%; }
  .uke-fret:nth-child(5) { width: 9%; }
  .uke-fret:nth-child(6) { width: 8.5%; }
  .uke-fret:nth-child(7) { width: 8%; }
  .uke-fret:nth-child(8) { width: 7.5%; }
  .uke-fret:nth-child(9) { width: 6.5%; }
  .uke-fret:nth-child(10) { width: 5.5%; }
  .uke-fret:nth-child(11) { width: 5%; }
  .uke-fret:nth-child(12) { width: 4%; border-right: none; } /* Останній лад без металу в кінці */

  /* Маркери на грифі (крапки) */
  .marker {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    background: #e5e5e5;
    border-radius: 50%;
    opacity: 0.7;
  }

  /* 4. ДЕКА (ТІЛО УКУЛЕЛЕ) */
  .uke-body {
    width: 290px;
    height: 220px;
    background: linear-gradient(135deg, #111b2b 0%, #1a2c47 40%, #0d1522 100%);
    /* Створюємо форму "вісімки" або гітарного корпусу */
    border-radius: 40% 30% 30% 40% / 50% 50% 50% 50%; 
    position: relative;
    box-shadow: inset -15px -15px 30px rgba(0,0,0,0.6), 10px 15px 25px rgba(0,0,0,0.5);
    z-index: 1;
    border: 2px solid #0a111c;
  }

  /* 5. РОЗЕТКА (Звуковий отвір) */
  .uke-soundhole {
    width: 85px;
    height: 85px;
    background: #000;
    border-radius: 50%;
    position: absolute;
    left: 30px; /* Отвір знаходиться частково під кінцем грифа */
    top: 50%;
    transform: translateY(-50%);
    border: 5px solid #2a4060; /* Декоративне кільце */
    box-shadow: inset 0 10px 15px rgba(255,255,255,0.05);
  }

</style>
</head>
<body>

  <div class="ukulele-layer-1">
    
    <div class="uke-head"></div>
    
    <div class="uke-neck">
      <div class="uke-fret"></div> <div class="uke-fret"></div> <div class="uke-fret"></div> <div class="uke-fret"></div> <div class="uke-fret"><div class="marker"></div></div> <div class="uke-fret"></div> <div class="uke-fret"><div class="marker"></div></div> <div class="uke-fret"></div> <div class="uke-fret"></div> <div class="uke-fret"><div class="marker"></div></div> <div class="uke-fret"></div> <div class="uke-fret"><div class="marker" style="top:30%"></div><div class="marker" style="top:70%"></div></div> </div>
    
    <div class="uke-body">
      <div class="uke-soundhole"></div>
    </div>

  </div>

</body>
</html>
