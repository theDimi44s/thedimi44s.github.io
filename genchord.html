<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Chord Generator PRO</title>

<style>

body{
background:#0f1117;
color:#e6edf3;
font-family:system-ui;
padding:40px;
}

button{
background:#30363d;
border:none;
padding:10px 16px;
margin:5px;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#3c444d;
}

button:active{
transform:scale(0.96);
background:#238636;
}

button.active{
background:#238636;
box-shadow:0 0 10px rgba(35,134,54,0.6);
}

textarea{
width:100%;
height:520px;
background:#0d1117;
border:1px solid #30363d;
color:#c9d1d9;
padding:15px;
border-radius:8px;
font-family:monospace;
font-size:14px;
}

select{
background:#161b22;
color:white;
border:1px solid #30363d;
padding:8px;
border-radius:6px;
margin:5px;
}

</style>
</head>

<body>

<h2>Генератор акордів</h2>

<div id="instrumentButtons">
<button onclick="setInstrument('ukulele',this)">Укулеле</button>
<button onclick="setInstrument('baritone',this)">Баритон</button>
<button onclick="setInstrument('guitar',this)">Гітара</button>
<button onclick="setInstrument('guitalele',this)">Гіталеле</button>
<button onclick="setInstrument('bass',this)">Бас</button>
</div>

<br><br>

Root
<select id="root">
<option>C</option><option>C#</option><option>Db</option>
<option>D</option><option>D#</option><option>Eb</option>
<option>E</option>
<option>F</option><option>F#</option><option>Gb</option>
<option>G</option><option>G#</option><option>Ab</option>
<option>A</option><option>A#</option><option>Bb</option>
<option>B</option>
</select>

Тип акорду
<select id="type"></select>

Кількість
<select id="limit">
<option value="6">6</option>
<option value="10">10</option>
<option value="20">20</option>
<option value="40">40</option>
</select>

<br><br>

<button onclick="generate()">Генерувати</button>
<button onclick="generateAll()">Згенерувати ВСІ акорди</button>
<button onclick="copyResult()">Скопіювати</button>

<br><br>

<textarea id="output"></textarea>

<script>

const NOTES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]

const FLAT_MAP={
Db:"C#",
Eb:"D#",
Gb:"F#",
Ab:"G#",
Bb:"A#"
}

const NOTE_NAMES={
C:"До",
D:"Ре",
E:"Мі",
F:"Фа",
G:"Соль",
A:"Ля",
B:"Сі"
}

const intervals={

"": [0,4,7],
"m":[0,3,7],
"sus2":[0,2,7],
"sus4":[0,5,7],
"dim":[0,3,6],
"aug":[0,4,8],

"6":[0,4,7,9],
"m6":[0,3,7,9],

"7":[0,4,7,10],
"maj7":[0,4,7,11],
"m7":[0,3,7,10],

"9":[0,4,7,10,2],
"m9":[0,3,7,10,2],
"maj9":[0,4,7,11,2],

"11":[0,4,7,10,2,5],
"13":[0,4,7,10,2,5,9],

"dim7":[0,3,6,9],
"m7b5":[0,3,6,10],

"7sus4":[0,5,7,10],
"7#9":[0,4,7,10,3],
"7b9":[0,4,7,10,1],

"add9":[0,4,7,2],
"m(add9)":[0,3,7,2]

}

const types=Object.keys(intervals)

const instruments={
ukulele:["G","C","E","A"],
baritone:["D","G","B","E"],
guitar:["E","A","D","G","B","E"],
guitalele:["A","D","G","C","E","A"],
bass:["E","A","D","G"]
}

let tuning=instruments.ukulele

function setInstrument(name,btn){
tuning=instruments[name]
document.querySelectorAll("#instrumentButtons button")
.forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

function normalize(root){
return FLAT_MAP[root] || root
}

function noteIndex(n){
return NOTES.indexOf(n)
}

function getNote(open,fret){
return NOTES[(noteIndex(open)+fret)%12]
}

function span(frets){
return Math.max(...frets)-Math.min(...frets)
}

function generateFrets(strings,max){

let results=[]

function helper(arr){

if(arr.length===strings){
results.push([...arr])
return
}

for(let i=0;i<=max;i++){
arr.push(i)
helper(arr)
arr.pop()
}

}

helper([])
return results

}

function detectChordNotes(root,type){

let rootNorm=normalize(root)

let idxRoot=noteIndex(rootNorm)

let ints=intervals[type]

return ints.map(i=>NOTES[(idxRoot+i)%12])

}

function generateNormal(root,type,limit){

let needed=detectChordNotes(root,type)

let fretsAll=generateFrets(tuning.length,12)

let results=[]

for(let frets of fretsAll){

if(span(frets)>4) continue

let notes=[]

for(let i=0;i<frets.length;i++)
notes.push(getNote(tuning[i],frets[i]))

let ok=true

for(let n of notes)
if(!needed.includes(n)) ok=false

if(!ok) continue

if(!notes.includes(normalize(root))) continue

results.push({frets})

if(results.length>=limit) break

}

return results
}

function generateBarre(root,type){

let needed=detectChordNotes(root,type)

let results=[]

for(let barre=1;barre<=12;barre++){

let frets=new Array(tuning.length).fill(barre)

let notes=[]

for(let i=0;i<tuning.length;i++)
notes.push(getNote(tuning[i],frets[i]))

let ok=true

for(let n of notes)
if(!needed.includes(n)) ok=false

if(!ok) continue

results.push({frets,barre})

}

return results
}

function generateBarreExtra(root,type){

let needed=detectChordNotes(root,type)

let results=[]

for(let barre=1;barre<=12;barre++){

for(let add=1;add<=3;add++){

let frets=[]

for(let i=0;i<tuning.length;i++){

let fret=barre

if(i===1) fret=barre+add

frets.push(fret)

}

let notes=[]

for(let i=0;i<frets.length;i++)
notes.push(getNote(tuning[i],frets[i]))

let ok=true

for(let n of notes)
if(!needed.includes(n)) ok=false

if(!ok) continue

results.push({frets,barre,extra:true})

}

}

return results
}

function formatChord(root,type,positions,limit){

let chordName=root+type

let baseNote=NOTE_NAMES[root[0]]||root

let output=[]

for(let i=0;i<positions.length && i<limit;i++){

let p=positions[i]

let key=p.frets.join(",")

let label=i===0
?`${baseNote} ${type||"мажор"}`
:`${baseNote} ${type||"мажор"} (Альт.)`

if(p.barre){

if(p.extra){

output.push(`"${key}*barre": { name: "${chordName}", note: "${label} (З повним баре)", barre: ${p.barre} },`)

}else{

output.push(`"${key}": { name: "${chordName}", note: "${label}", barre: ${p.barre} },`)

}

}else{

output.push(`"${key}*${chordName}": { name: "${chordName}", note: "${label}" },`)

}

}

return output

}

function generate(){

let root=document.getElementById("root").value
let type=document.getElementById("type").value
let limit=parseInt(document.getElementById("limit").value)

let normal=generateNormal(root,type,limit)

let barre=generateBarre(root,type)

let barreExtra=generateBarreExtra(root,type)

let all=[...normal,...barre,...barreExtra]

let lines=formatChord(root,type,all,limit)

document.getElementById("output").value=lines.join("\n")

}

function generateAll(){

let limit=parseInt(document.getElementById("limit").value)

let roots=[
"C","C#","Db","D","D#","Eb","E",
"F","F#","Gb","G","G#","Ab",
"A","A#","Bb","B"
]

let output=[]

for(let root of roots){

for(let type of types){

let normal=generateNormal(root,type,limit)
let barre=generateBarre(root,type)
let barreExtra=generateBarreExtra(root,type)

let all=[...normal,...barre,...barreExtra]

if(all.length===0) continue

output.push(`// Акорд ${root}${type}`)

let lines=formatChord(root,type,all,limit)

output.push(...lines)

output.push("")

}

}

document.getElementById("output").value=output.join("\n")

}

function copyResult(){
navigator.clipboard.writeText(
document.getElementById("output").value
)
}

const typeSelect=document.getElementById("type")

for(let t of types){

let opt=document.createElement("option")
opt.value=t
opt.text=t||"maj"

typeSelect.appendChild(opt)

}

</script>

</body>
</html>
